openapi: 3.1.0
info:
  title: huble
  description: Application-agnostic LLM service with multi-provider support and billing tracking
  version: 1.2.0
paths:
  /health/:
    get:
      tags:
      - Health
      summary: Health Check
      description: 'Basic health check endpoint

        Returns 200 OK if service is running'
      operationId: health_check_health__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResponse'
  /health/live:
    get:
      tags:
      - Health
      summary: Liveness Probe
      description: 'Kubernetes liveness probe

        Checks if the service is alive and database is accessible'
      operationId: liveness_probe_health_live_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailedHealthCheckResponse'
  /health/ready:
    get:
      tags:
      - Health
      summary: Readiness Probe
      description: 'Kubernetes readiness probe

        Checks if service is ready to accept traffic'
      operationId: readiness_probe_health_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailedHealthCheckResponse'
  /api/public/providers:
    get:
      tags:
      - Public Website
      summary: Get Providers Public
      description: 'PUBLIC - Get list of LLM providers for website display.

        Returns active providers with model counts.'
      operationId: get_providers_public_api_public_providers_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Get Providers Public Api Public Providers Get
  /api/public/providers/{provider_key}:
    get:
      tags:
      - Public Website
      summary: Get Provider Detail Public
      description: PUBLIC - Get detailed provider information including models.
      operationId: get_provider_detail_public_api_public_providers__provider_key__get
      parameters:
      - name: provider_key
        in: path
        required: true
        schema:
          type: string
          title: Provider Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Provider Detail Public Api Public Providers  Provider Key  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/public/models:
    get:
      tags:
      - Public Website
      summary: Get Models Public
      description: PUBLIC - Get list of all available models.
      operationId: get_models_public_api_public_models_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Get Models Public Api Public Models Get
  /api/public/models/{model_key}:
    get:
      tags:
      - Public Website
      summary: Get Model Detail Public
      description: PUBLIC - Get detailed model information including provider and pricing.
      operationId: get_model_detail_public_api_public_models__model_key__get
      parameters:
      - name: model_key
        in: path
        required: true
        schema:
          type: string
          title: Model Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Model Detail Public Api Public Models  Model Key  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/public/apicalls:
    get:
      tags:
      - Public Website
      summary: Get Api Call Categories
      description: PUBLIC - Get all API call categories with endpoint counts.
      operationId: get_api_call_categories_api_public_apicalls_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Get Api Call Categories Api Public Apicalls Get
  /api/public/apicalls/{category}:
    get:
      tags:
      - Public Website
      summary: Get Category Endpoints
      description: PUBLIC - Get all endpoints in a specific category.
      operationId: get_category_endpoints_api_public_apicalls__category__get
      parameters:
      - name: category
        in: path
        required: true
        schema:
          type: string
          title: Category
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Category Endpoints Api Public Apicalls  Category  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/public/endpoints/{endpoint_id}:
    get:
      tags:
      - Public Website
      summary: Get Endpoint Detail Public
      description: 'PUBLIC - Get full endpoint documentation for CallCard page.

        Returns endpoint details including description, parameters, code examples,

        response example, rate limits, and related endpoints.'
      operationId: get_endpoint_detail_public_api_public_endpoints__endpoint_id__get
      parameters:
      - name: endpoint_id
        in: path
        required: true
        schema:
          type: string
          title: Endpoint Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Endpoint Detail Public Api Public Endpoints  Endpoint Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/public/capabilities:
    get:
      tags:
      - Public Website
      summary: Get Capabilities Public
      description: PUBLIC - Get AI capabilities/model types offered.
      operationId: get_capabilities_public_api_public_capabilities_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Get Capabilities Public Api Public Capabilities Get
  /api/public/stats:
    get:
      tags:
      - Public Website
      summary: Get Platform Stats
      description: PUBLIC - Get high-level platform statistics for homepage.
      operationId: get_platform_stats_api_public_stats_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Get Platform Stats Api Public Stats Get
  /api/public/pricing:
    get:
      tags:
      - Public Website
      summary: Get Pricing Catalog
      description: 'PUBLIC - Get complete API pricing catalog for marketing website.

        Returns all active endpoints with pricing and category metadata.'
      operationId: get_pricing_catalog_api_public_pricing_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Get Pricing Catalog Api Public Pricing Get
  /api/v1/auth/register:
    post:
      tags:
      - Authentication
      - Authentication
      summary: Register
      description: 'Register a new user with email and password


        - If org_name is provided: Creates user with organization (user becomes org_admin)

        - If org_name is not provided: Creates individual user (can join/create org later)

        - If invitation_token is provided: Inviter becomes user''s Super-Dev'
      operationId: register_api_v1_auth_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/login:
    post:
      tags:
      - Authentication
      - Authentication
      summary: Login
      description: 'Login with email and password


        **Note:** Password authentication is not yet fully implemented.

        Use GitHub OAuth for authentication.'
      operationId: login_api_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/refresh:
    post:
      tags:
      - Authentication
      - Authentication
      summary: Refresh Token
      description: 'Refresh access token using refresh token


        Generates a new access token and refresh token pair.

        The old refresh token is invalidated.'
      operationId: refresh_token_api_v1_auth_refresh_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/logout:
    post:
      tags:
      - Authentication
      - Authentication
      summary: Logout
      description: 'Logout and invalidate current session


        Clears session cookie and invalidates tokens.'
      operationId: logout_api_v1_auth_logout_post
      security:
      - HTTPBearer: []
      parameters:
      - name: session_token
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Session Token
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/oauth/providers:
    get:
      tags:
      - Authentication
      - Authentication
      summary: Get Oauth Providers
      description: 'Get list of configured OAuth providers


        Returns list of available OAuth providers that can be used for authentication.'
      operationId: get_oauth_providers_api_v1_auth_oauth_providers_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/auth/oauth/{provider}:
    get:
      tags:
      - Authentication
      - Authentication
      summary: Oauth Login
      description: 'Initiate OAuth flow for a provider


        Redirects user to OAuth provider''s authorization page.


        **Supported providers:** github, google (coming soon), linkedin (coming soon)'
      operationId: oauth_login_api_v1_auth_oauth__provider__get
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
          title: Provider
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/oauth/{provider}/callback:
    get:
      tags:
      - Authentication
      - Authentication
      summary: Oauth Callback
      description: 'OAuth callback endpoint


        Handles the redirect from OAuth provider after user authorizes.


        **This endpoint is called by the OAuth provider, not directly by the client.**'
      operationId: oauth_callback_api_v1_auth_oauth__provider__callback_get
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
          title: Provider
      - name: code
        in: query
        required: true
        schema:
          type: string
          title: Code
      - name: state
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: State
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/oauth/{provider}/register:
    post:
      tags:
      - Authentication
      - Authentication
      summary: Oauth Register
      description: 'Complete OAuth registration with organization details


        After OAuth callback returns registration_required, call this endpoint

        to complete registration and create the organization.'
      operationId: oauth_register_api_v1_auth_oauth__provider__register_post
      parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
          title: Provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/me:
    get:
      tags:
      - Authentication
      - Authentication
      summary: Get Current User Info
      description: 'Get current authenticated user information


        Returns detailed information about the currently logged-in user,

        including roles and organization.'
      operationId: get_current_user_info_api_v1_auth_me_get
      security:
      - HTTPBearer: []
      parameters:
      - name: session_token
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Session Token
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/verify:
    get:
      tags:
      - Authentication
      - Authentication
      summary: Verify Token
      description: 'Verify if current token is valid


        Simple endpoint to check if the user''s access token is still valid.

        Returns 200 if valid, 401 if invalid/expired.'
      operationId: verify_token_api_v1_auth_verify_get
      security:
      - HTTPBearer: []
      parameters:
      - name: session_token
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Session Token
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/verify-email/{token}:
    get:
      tags:
      - Authentication
      - Authentication
      summary: Verify Email
      description: 'Verify email address using token from email


        Users click the link in their verification email to verify their account.'
      operationId: verify_email_api_v1_auth_verify_email__token__get
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
          title: Token
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/resend-verification:
    post:
      tags:
      - Authentication
      - Authentication
      summary: Resend Verification Email
      description: 'Resend email verification link


        Authenticated users can request a new verification email if they lost the original.'
      operationId: resend_verification_email_api_v1_auth_resend_verification_post
      security:
      - HTTPBearer: []
      parameters:
      - name: session_token
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Session Token
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/forgot-password:
    post:
      tags:
      - Authentication
      - Authentication
      summary: Forgot Password
      description: 'Request password reset email


        Sends a password reset link to the user''s email address.

        Returns success even if email doesn''t exist (security best practice).'
      operationId: forgot_password_api_v1_auth_forgot_password_post
      parameters:
      - name: email
        in: query
        required: true
        schema:
          type: string
          title: Email
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/reset-password:
    post:
      tags:
      - Authentication
      - Authentication
      summary: Reset Password
      description: 'Reset password using token from email


        Users provide the token from their email and a new password.'
      operationId: reset_password_api_v1_auth_reset_password_post
      parameters:
      - name: token
        in: query
        required: true
        schema:
          type: string
          title: Token
      - name: new_password
        in: query
        required: true
        schema:
          type: string
          title: New Password
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users:
    get:
      tags:
      - User Management
      - User Management
      summary: List Users
      description: 'List users with pagination and filtering


        **Permissions:**

        - **Super Admin:** Can see all users across all organizations

        - **Super Dev:** Can see users from assigned organizations only

        - **Organization Admin:** Can only see users in their organization

        - **User:** Not authorized (403)'
      operationId: list_users_api_v1_users_get
      security:
      - HTTPBearer: []
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          description: Page number
          default: 1
          title: Page
        description: Page number
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Items per page
          default: 50
          title: Page Size
        description: Items per page
      - name: org_id
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          description: Filter by organization ID
          title: Org Id
        description: Filter by organization ID
      - name: is_active
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: Filter by active status
          title: Is Active
        description: Filter by active status
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Search by email or name
          title: Search
        description: Search by email or name
      - name: role_filter
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 'Filter by roles (comma-separated: super_admin,super_dev,org_admin,user)'
          title: Role Filter
        description: 'Filter by roles (comma-separated: super_admin,super_dev,org_admin,user)'
      - name: session_token
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Session Token
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - User Management
      - User Management
      summary: Create User
      description: 'Create a new user in an organization


        **Permissions:**

        - **Super Admin:** Can create users in any organization

        - **Super Dev:** Can create users in assigned organizations

        - **Organization Admin:** Can create users in their organization only'
      operationId: create_user_api_v1_users_post
      security:
      - HTTPBearer: []
      parameters:
      - name: session_token
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Session Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/{user_id}:
    get:
      tags:
      - User Management
      - User Management
      summary: Get User
      description: 'Get detailed information about a specific user


        **Permissions:**

        - **Super Admin:** Can view any user

        - **Super Dev:** Can view users in assigned organizations

        - **Organization Admin:** Can view users in their organization

        - **User:** Can only view their own profile'
      operationId: get_user_api_v1_users__user_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: User Id
      - name: session_token
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Session Token
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - User Management
      - User Management
      summary: Update User
      description: 'Update user information


        **Permissions:**

        - **Super Admin:** Can update any user

        - **Super Dev:** Can update users in assigned organizations

        - **Organization Admin:** Can update users in their organization

        - **User:** Can update their own profile (limited fields)'
      operationId: update_user_api_v1_users__user_id__patch
      security:
      - HTTPBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: User Id
      - name: session_token
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Session Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - User Management
      - User Management
      summary: Delete User
      description: 'Deactivate a user (soft delete)


        **Note:** This doesn''t delete the user from the database, it just sets is_active=False.


        **Permissions:**

        - **Super Admin:** Can deactivate any user

        - **Organization Admin:** Can deactivate users in their organization'
      operationId: delete_user_api_v1_users__user_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: User Id
      - name: session_token
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Session Token
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/{user_id}/admin-set-password:
    post:
      tags:
      - User Management
      - User Management
      summary: Admin Set Password
      description: 'Set a new password for a user (admin-initiated)


        This endpoint allows administrators to set a new password for a user.

        All existing sessions for the user will be invalidated for security.

        Optionally sends an email notification to the user with the new password.


        **Permissions:**

        - **Super Admin:** Can change password for any user

        - **Organization Admin:** Can change password for users in their organization


        **Security:**

        - Password must be at least 8 characters

        - All user sessions are invalidated

        - Email notification sent (if enabled)

