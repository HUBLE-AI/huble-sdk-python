          anyOf:
          - type: string
            maxLength: 50000
            minLength: 1
          - type: 'null'
          title: Text
          description: Plain text to translate
        content:
          anyOf:
          - $ref: '#/components/schemas/TranslationContent'
          - type: 'null'
          description: Structured content to translate (title, body, meta_title, etc.)
        source_language:
          type: string
          title: Source Language
          description: Source language code (e.g., 'en', 'de', 'fr')
        target_language:
          anyOf:
          - type: string
          - type: 'null'
          title: Target Language
          description: Single target language code (simple mode)
        target_languages:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Target Languages
          description: Multiple target language codes (structured mode)
      type: object
      required:
      - source_language
      title: V2TextTranslateRequest
      description: 'Translate text between languages


        Supports two modes:

        1. Simple text translation: Provide ''text'', ''source_language'', ''target_language''

        2. Structured content translation: Provide ''content'', ''source_language'', ''target_languages''


        Either ''text'' or ''content'' must be provided (not both).

        Either ''target_language'' or ''target_languages'' must be provided (not both).'
      example:
        source_language: en
        target_language: de
        text: Hello, how are you today?
