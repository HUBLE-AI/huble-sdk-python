    V2AgentChatRequest:
      properties:
        shape:
          anyOf:
          - type: string
          - type: 'null'
          title: Shape
          description: 'Wire shape of the request: ''openai'' or ''anthropic''. Auto-detected if absent.'
        response_shape:
          anyOf:
          - type: string
          - type: 'null'
          title: Response Shape
          description: Wire shape of the response. Defaults to mirror the request shape.
        provider:
          anyOf:
          - type: string
          - type: 'null'
          title: Provider
          description: Provider override (claude, melious, openai, ...)
        model:
          anyOf:
          - type: string
          - type: 'null'
          title: Model
          description: Model override
        messages:
          items:
            additionalProperties: true
            type: object
          type: array
          minItems: 1
          title: Messages
          description: Multi-turn conversation. Either OpenAI or Anthropic shape.
        system:
          anyOf:
          - type: string
          - type: 'null'
          title: System
          description: Top-level system prompt (Anthropic-style). Alternative to a system message.
        tools:
          anyOf:
          - items:
              additionalProperties: true
              type: object
            type: array
          - type: 'null'
          title: Tools
          description: Tool/function definitions
        tool_choice:
          anyOf:
          - type: string
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Tool Choice
          description: '''auto'' | ''none'' | ''required'' | {type:''function'',function:{name:X}} | Anthropic shape'
        max_tokens:
          anyOf:
          - type: integer
            maximum: 16000.0
            minimum: 1.0
          - type: 'null'
          title: Max Tokens
          default: 1024
        temperature:
          anyOf:
          - type: number
            maximum: 2.0
            minimum: 0.0
          - type: 'null'
          title: Temperature
        provider_options:
          anyOf:
          - additionalProperties:
              additionalProperties: true
              type: object
            type: object
          - type: 'null'
          title: Provider Options
          description: Per-provider knobs, e.g. {'anthropic':{'cache_control':[...],'thinking':{...}}}
      type: object
      required:
      - messages
      title: V2AgentChatRequest
      description: 'Multi-turn chat with tool-use support.


        Accepts BOTH OpenAI shape and Anthropic shape — auto-detected when

        `shape` is not set. Internally everything is canonicalised to OpenAI

        pivot; provider-side translators handle the SDK boundary.


        Note: max_tokens floor is 1 (not 100 like V2BaseRequest) because

        short replies during tool loops are normal.'
    V2AgentChatResponse:
      properties:
        success:
          type: boolean
          title: Success
          default: true
        content:
          title: Content
        tool_calls:
          anyOf:
          - items:
              additionalProperties: true
              type: object
            type: array
          - type: 'null'
          title: Tool Calls
        stop_reason:
          type: string
          title: Stop Reason
        provider_used:
          type: string
          title: Provider Used
        model_used:
          type: string
          title: Model Used
        input_tokens:
          type: integer
          title: Input Tokens
          default: 0
        output_tokens:
          type: integer
          title: Output Tokens
          default: 0
        tokens_used:
          type: integer
          title: Tokens Used
          default: 0
        cost_usd:
          type: number
          title: Cost Usd
          default: 0.0
        generation_time_ms:
          type: integer
          title: Generation Time Ms
          default: 0
        log_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Log Id
        provider_metadata:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Provider Metadata
        shape:
          type: string
          title: Shape
      type: object
      required:
      - stop_reason
      - provider_used
      - model_used
      - shape
      title: V2AgentChatResponse
      description: 'Agent chat response. Content / tool_calls / stop_reason rendered in

        the requested wire shape; bookkeeping fields stay canonical.'
