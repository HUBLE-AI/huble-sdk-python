      description: "Get clips for a project\n\nReturns all generated clips for the specified project.\nProjects may take several minutes to process depending on video length.\n\n**Status values**:\n- `processing`:\
        \ Still generating clips\n- `completed`: All clips ready\n- `failed`: Processing failed\n\n**Example Response**:\n```json\n{\n    \"project_id\": \"abc123\",\n    \"status\": \"completed\",\n  \
        \  \"total_clips\": 5,\n    \"clips\": [\n        {\n            \"clip_id\": \"clip1\",\n            \"title\": \"Best moment from your video\",\n            \"duration_seconds\": 45,\n       \
