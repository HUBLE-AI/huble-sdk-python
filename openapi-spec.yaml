      - Invoices
      summary: Update Invoice Status
      description: 'Update invoice status.


        Valid transitions:

        - draft -> issued, cancelled

        - issued -> paid, overdue, cancelled

        - overdue -> paid, cancelled

        - paid -> (final state)

        - cancelled -> (final state)


        **Permissions:**

        - Super Admin: Can update any invoice

