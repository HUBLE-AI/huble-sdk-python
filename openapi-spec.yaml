        model:
          anyOf:
          - type: string
          - type: 'null'
          title: Model
          description: Optional model override
        max_tokens:
          anyOf:
          - type: integer
            maximum: 16000.0
            minimum: 100.0
          - type: 'null'
          title: Max Tokens
          description: Maximum tokens to generate
        temperature:
          anyOf:
          - type: number
            maximum: 2.0
            minimum: 0.0
          - type: 'null'
          title: Temperature
          description: Temperature for generation
        texts:
          anyOf:
          - type: string
          - items:
              type: string
            type: array
          title: Texts
          description: Single text or list of texts to embed
        input_type:
          anyOf:
          - type: string
          - type: 'null'
          title: Input Type
          description: '''document'' for content to search, ''query'' for search queries (improves retrieval)'
        output_dimension:
          anyOf:
          - type: integer
          - type: 'null'
          title: Output Dimension
          description: 'Embedding dimensions: 256, 512, 1024, or 2048 (default: model-specific)'
